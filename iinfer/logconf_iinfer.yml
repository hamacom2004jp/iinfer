version: 1

formatters:
    fmt:
        format: '[%(asctime)s] %(levelname)s - %(message)s'
        datefmt: '%Y-%m-%d %H:%M:%S'
        class: logging.Formatter
    fmt_rich:
        format: '%(message)s'
        class: logging.Formatter
handlers:
    std:
        class: cmdbox.app.commons.loghandler.ColorfulStreamHandler
        level: INFO
        formatter: fmt
        stream: ext://sys.stdout
    rich:
        class: rich.logging.RichHandler
        level: INFO
        formatter: fmt_rich
        show_path: false
        omit_repeated_times: false
        tracebacks_word_wrap: false
        log_time_format: '[%Y-%m-%d %H:%M]'
    a2asv:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_a2asv.log
    cmdbox:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/cmdbox.log
    edge:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_edge.log
    mcpsv:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_mcpsv.log
    server:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_server.log
    web:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_web.log
    logcl:
        class: logging.handlers.SocketHandler
        level: INFO
        formatter: fmt
        host: 'localhost'
        port: 9020
    logsv:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_logsv.log

    iinfer:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer.log
    install:
        class: cmdbox.app.commons.loghandler.TimedRotatingFileHandler
        level: INFO
        formatter: fmt
        backupCount: 5
        when : 'D'
        encoding : 'utf-8'
        filename: .logs/iinfer_install.log

loggers:
    a2asv:
        handlers: [a2asv, std]
        level: INFO
        qualname: a2asv
        propagate: false
    cmdbox:
        handlers: [cmdbox, std]
        level: INFO
        qualname: cmdbox
        propagate: false
    edge:
        handlers: [edge, std]
        level: INFO
        qualname: edge
        propagate: false
    mcpsv:
        handlers: [mcpsv, std]
        level: INFO
        qualname: mcpsv
        propagate: false
    server:
        handlers: [server, std]
        level: INFO
        qualname: server
        propagate: false
    web:
        handlers: [web, std]
        level: INFO
        qualname: web
        propagate: false
    logcl:
        handlers: [logcl]
        level: INFO
        qualname: logcl
        propagate: false
    logsv:
        handlers: [logsv]
        level: INFO
        qualname: logsv
        propagate: false

    iinfer:
        handlers: [iinfer, std]
        level: INFO
        qualname: iinfer
        propagate: false
    install:
        handlers: [install, std]
        level: INFO
        qualname: install
        propagate: false

